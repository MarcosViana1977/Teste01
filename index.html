<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Avaliação</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:active {
            transform: scale(0.95);
        }
        .btn-like {
            background-color: #2ecc71;
            color: white;
        }
        .btn-like:hover {
            background-color: #27ae60;
        }
        .btn-dislike {
            background-color: #e74c3c;
            color: white;
        }
        .btn-dislike:hover {
            background-color: #c0392b;
        }
        span {
            display: block;
            margin-top: 8px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Você gostou deste conteúdo?</h1>
        
        <div class="buttons">
            <div>
                <button class="btn-like" id="likeBtn">👍 Gostei</button>
                <span id="likeCount">0</span>
            </div>
            <div>
                <button class="btn-dislike" id="dislikeBtn">👎 Não Gostei</button>
                <span id="dislikeCount">0</span>
            </div>
        </div>
    </div>

    <script>
        // Selecionando os elementos
        const likeBtn = document.getElementById('likeBtn');
        const dislikeBtn = document.getElementById('dislikeBtn');
        const likeCount = document.getElementById('likeCount');
        const dislikeCount = document.getElementById('dislikeCount');

        // Variáveis para armazenar a contagem
        let likes = 0;
        let dislikes = 0;

        // Evento de clique no botão Gostei
        likeBtn.addEventListener('click', () => {
            likes++;
            likeCount.textContent = likes;
        });

        // Evento de clique no botão Não Gostei
        dislikeBtn.addEventListener('click', () => {
            dislikes++;
            dislikeCount.textContent = dislikes;
        });
    </script>

</body>
</html>
